apiVersion: v1
kind: ConfigMap
metadata:
  name: samm-frontend-config
  namespace: samm-maturity
  labels:
    app.kubernetes.io/name: samm-maturity-platform
    app.kubernetes.io/component: frontend
data:
  UPSTREAM_API_URL: http://samm-backend.samm-maturity.svc.cluster.local:3000
---
apiVersion: v1
kind: Service
metadata:
  name: samm-frontend
  namespace: samm-maturity
  labels:
    app.kubernetes.io/name: samm-maturity-platform
    app.kubernetes.io/component: frontend
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: samm-maturity-platform
    app.kubernetes.io/component: frontend
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: samm-frontend
  namespace: samm-maturity
  labels:
    app.kubernetes.io/name: samm-maturity-platform
    app.kubernetes.io/component: frontend
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: samm-maturity-platform
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: samm-maturity-platform
        app.kubernetes.io/component: frontend
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: frontend
          image: dro13n/samm-maturity-platform-frontend:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: samm-frontend-config
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          securityContext:
            runAsUser: 101
            runAsGroup: 101
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: nginx-cache
              mountPath: /var/cache/nginx
      volumes:
        - name: tmp
          emptyDir: {}
        - name: nginx-cache
          emptyDir: {}
